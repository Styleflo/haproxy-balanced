defaults
    mode http
    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http_front
    bind *:80
    default_backend node_servers

backend node_servers
    balance roundrobin
    server node1 node1:3000 check
    server node2 node2:3000 check

listen stats
    bind *:8080
    mode http
    stats enable
    stats uri /stats
    stats refresh 5s
